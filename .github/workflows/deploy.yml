name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-app:
    name: CI app
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type checking
        run: pnpm tsc
      - name: Linting
        run: pnpm lint

  cd-app:
    needs: ci-app
    name: CD app
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v4
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build image
        run: docker build -t andrejdergavko/calory-diary-backend:${{ github.ref_name }} .
      - name: Push image
        run: docker push andrejdergavko/calory-diary-backend:${{ github.ref_name }}
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            IMAGE=andrejdergavko/calory-diary-backend:${{ github.ref_name }}
            CONTAINER=calory-diary-app
            PORT=3000

            docker pull "${IMAGE}"
            docker stop "${CONTAINER}" || true
            docker rm "${CONTAINER}" || true

            docker run -d \
              --restart=always \
              --name "${CONTAINER}" \
              --env DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              --env OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              --env PORT="${PORT}" \
              -p "${PORT}":"${PORT}" \
              "${IMAGE}"
            