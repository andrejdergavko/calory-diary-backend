version: "3"
services:
  app:
    build: .
    container_name: calory-diary-app
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: calory-diary-postgres
    image: postgres:18
    environment:
      POSTGRES_DB: "calory-diary-db"
      POSTGRES_USER: "andreidergavko"
      POSTGRES_PASSWORD: "andreidergavko"
    volumes:
      - ./calory-diary-postgres:/docker-entrypoint-initdb.d
    ports:
      - 5433:5432

  redis:
    container_name: calory-diary-redis
    image: redis:7-alpine
    volumes:
      - ./calory-diary-redis:/data
    ports:
      - 6379:6379
  # volumes:
  #   calory-diary-redis:
